package: a5_multiturn_intake_lightweight_evidence
purpose: Trace-level A5 multi-turn legal intake evidence package.
source_run:
  traces: 24
  turns: 72
  cases: 8
  models: 3
methodology_caveats:
- This is a limited A5 smoke/pilot run, not a statistically powered benchmark.
- The trace pass rate is a deterministic triage signal, not human-validated product
  readiness.
- Trace-level checks are deterministic triage signals and should be human-calibrated
  before release decisions.
- Raw full model outputs remain local/ignored; this package commits summaries and
  redacted hashes only.
included_artifacts:
- README.md
- artifact_manifest.yaml
- trace_metrics_summary.csv
- turn_level_summary.csv
- risk_route_summary.csv
- redacted_trace_samples.csv
- redacted_trace_example.md
- human_trace_calibration_template.csv
excluded_artifacts:
- trace_log.jsonl
- turn_log.csv
