project:
  name: Legal AI Product Boundary Eval - Qianfan
  experiment_id: EXP-QIANFAN-LEGAL-PRODUCT-BOUNDARY-V1
  boundary: stratified legal product-boundary evaluation; not legal advice; not model leaderboard
  jurisdiction: CN
  law_snapshot_date: "2026-07-08"
  legal_advice_boundary: 仅用于法律 AI 产品边界评测和数据治理原型，不构成法律咨询或最终法律意见。

dataset:
  path: data/eval_sets/legal_product_boundary_pilot_v1.jsonl
  format: jsonl
  case_id_field: case_id
  stratified_slices:
    - normal_practice
    - hard_legal_reasoning
    - risk_calibration
    - citation_grounding
    - adversarial_trap
    - counterfactual_pair
  slice_target_counts:
    normal_practice: 6
    hard_legal_reasoning: 6
    risk_calibration: 5
    citation_grounding: 5
    adversarial_trap: 4
    counterfactual_pair: 6

models:
  - alias: qianfan_ernie_51
    role: target_vendor_candidate
    vendor: Baidu
    family: ERNIE 5.1
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_ERNIE_51}
    input_cost_per_1k: ${QIANFAN_ERNIE_51_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_ERNIE_51_OUTPUT_COST_PER_1K}
    cost_currency: CNY
  - alias: qianfan_deepseek_v4_pro
    role: target_vendor_candidate
    vendor: DeepSeek
    family: DeepSeek V4 Pro
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_DEEPSEEK_V4_PRO}
    input_cost_per_1k: ${QIANFAN_DEEPSEEK_V4_PRO_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_DEEPSEEK_V4_PRO_OUTPUT_COST_PER_1K}
    cost_currency: CNY
  - alias: qianfan_qwen35_27b
    role: target_vendor_candidate
    vendor: Alibaba
    family: Qwen3.5-27B
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_QWEN35_27B}
    input_cost_per_1k: ${QIANFAN_QWEN35_27B_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_QWEN35_27B_OUTPUT_COST_PER_1K}
    cost_currency: CNY
  - alias: qianfan_glm_52
    role: target_vendor_candidate
    vendor: Zhipu
    family: GLM-5.2
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_GLM_52}
    input_cost_per_1k: ${QIANFAN_GLM_52_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_GLM_52_OUTPUT_COST_PER_1K}
    cost_currency: CNY
  - alias: qianfan_lite_baseline
    role: cost_baseline
    vendor: Qianfan
    family: Lite baseline placeholder
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_LITE_BASELINE}
    input_cost_per_1k: ${QIANFAN_LITE_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_LITE_OUTPUT_COST_PER_1K}
    cost_currency: CNY
    note: Replace with an available cheaper Qianfan model, or remove this block if no baseline is available.

workflow_conditions:
  - id: w0_closed_book
    current_prompt_version: V0
    product_shape: direct model answer without retrieval
    mock_compatible: true
  - id: w1_structured_legal_prompt
    current_prompt_version: V1
    product_shape: issue -> facts -> law -> analysis -> risk -> next steps
    mock_compatible: true
  - id: w2_rag_grounded
    current_prompt_version: V4
    product_shape: answer only using provided statutes, cases, contracts, or policy snippets
    mock_compatible: true
    implementation_note: First version uses provided_context grounding, not automatic retrieval.
  - id: w3_rag_verifier_router
    current_prompt_version: V3
    product_shape: grounded answer plus citation verifier, risk checker, and human-review routing
    mock_compatible: true
    implementation_note: First version evaluates verifier/router behavior from provided_context and judge labels.
  - id: w4_clarification_first
    current_prompt_version: V5
    product_shape: ask clarifying questions before final answer when material facts are missing
    mock_compatible: true

judge:
  provider: openai_compatible
  base_url: ${QIANFAN_BASE_URL}
  api_key: ${QIANFAN_API_KEY}
  model: ${QIANFAN_JUDGE_MODEL}
  temperature: 0.0
  llm_judge_supported: true
  mock_compatible: true
  human_review_sample_rate: 0.2

scoring:
  primary_dimensions:
    - legal_issue_spotting
    - material_fact_sensitivity
    - citation_fidelity
    - risk_calibration
    - clarification_behavior
    - human_review_routing
    - product_usability
  task_specific_rubric_scoring: true
  critical_failure_blocks_release: true
  critical_failure_labels:
    - fabricated_citation
    - invented_fact
    - overconfident_win_rate
    - unsafe_or_deceptive_assistance
    - missed_human_review
    - misclassified_legal_relationship
    - unsupported_document_claim
    - ignored_material_fact_change
    - failed_to_question_bad_premise

outputs:
  capture_cost_latency: true
  capture_data_routing: true
  expected_files:
    - model_run_log.csv
    - judge_scores.csv
    - data_routing.csv
    - human_review_calibration.csv
    - release_gate.csv
    - executive_dashboard.xlsx

product_decision_outputs:
  - auto_answer_eligibility
  - human_review_policy
  - model_workflow_routing
  - release_gate_decision
  - badcase_mining
  - sft_candidate_queue
  - preference_pair_queue
  - regression_eval_growth
